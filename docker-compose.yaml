services:

  mysql:
    image: mysql:8
    container_name: MySQL
    restart: always
    command: --default-authentication-plugin=mysql_native_password
#    ports:              # Uncomment both lines if you want to
#      - 3306:3306       # access the database outside the api.
    env_file:
      - .env
    networks:
      - network-database

  beerstock:
    build: .
    container_name: beerstock_api
    env_file:
      - .env
    ports:
      - 8080:8080
    restart: always
    depends_on:
      - mysql
    networks:
      - network-database

networks:
  network-database:
